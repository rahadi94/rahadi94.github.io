{% include base_path %}

<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav">
        <button><div class="navicon"></div></button>
        <ul class="visible-links">
          <li class="masthead__menu-item masthead__menu-item--lg"><a href="{{ base_path }}/">{{ site.title }}</a></li>
          {% for link in site.data.navigation.main %}
            {% if link.url contains 'http' %}
              {% assign domain = '' %}
              {% else %}
              {% assign domain = base_path %}
            {% endif %}
            <li class="masthead__menu-item"><a href="{{ domain }}{{ link.url }}">{{ link.title }}</a></li>
          {% endfor %}
        </ul>
        <ul class="hidden-links hidden"></ul>
        <div class="masthead__search" style="margin-left:auto; position:relative;">
          <input id="site-search" type="search" placeholder="Search..." aria-label="Search" style="padding:6px 8px; border:1px solid #ddd; border-radius:4px; width:180px;">
          <div id="site-search-results" style="position:absolute; right:0; top:36px; background:#fff; border:1px solid #ddd; border-radius:6px; box-shadow:0 6px 18px rgba(0,0,0,0.08); width:360px; max-height:320px; overflow:auto; display:none; z-index:1000;"></div>
        </div>
      </nav>
    </div>
  </div>
</div>
